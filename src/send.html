<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send a Message</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #16213e;
            padding: 40px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #e94560;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #aaa;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f3460;
            color: #eee;
            font-size: 16px;
        }
        textarea { height: 120px; resize: vertical; }
        button {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover { background: #c73652; }
        #feedback {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #4ecca3;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Send a Message</h1>
        <form id="form">
            <label for="author">Your name</label>
            <input type="text" id="author" name="author" required placeholder="e.g. The Family">
            <label for="text">Your message</label>
            <textarea id="text" name="text" required placeholder="Go go go! We're cheering for you!"></textarea>
            <button type="submit">Send</button>
        </form>
        <div id="feedback"></div>
    </div>

    <script>
        const form = document.getElementById('form');
        const feedback = document.getElementById('feedback');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const author = document.getElementById('author').value.trim();
            const text = document.getElementById('text').value.trim();
            if (!author || !text) return;

            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ author, text }),
                });
                if (res.ok) {
                    feedback.textContent = 'Message sent!';
                    document.getElementById('text').value = '';
                } else {
                    feedback.textContent = 'Failed to send. Try again.';
                }
            } catch (err) {
                feedback.textContent = 'Connection error. Try again.';
            }

            setTimeout(() => { feedback.textContent = ''; }, 3000);
        });
    </script>
</body>
</html>
