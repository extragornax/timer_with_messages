<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24h Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;500&family=League+Gothic&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            color: #eee;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(217, 90, 60, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(78, 204, 163, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Clock always centered on screen, independent of messages. */
        #clock-layer {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* Messages sit in the lower part, below the centered clock. The band
           is bounded top and bottom so a long message can never grow upward
           into the digits; fitMessage() moves `top` to just under the clock
           and shrinks the text until it fits. */
        #message-layer {
            position: fixed;
            left: 0;
            right: 0;
            top: 58vh;
            bottom: 5vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Simulate-mode date field (shown only on /simulate). */
        #sim-controls {
            position: fixed;
            top: 2vh;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 10px;
            align-items: center;
            z-index: 5;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 6px 12px;
        }
        #sim-controls.on { display: flex; }
        #sim-controls label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        #sim-controls input {
            background: rgba(255, 255, 255, 0.06);
            color: #eee;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            padding: 5px 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color-scheme: dark;
            outline: none;
        }

        #timer {
            font-family: 'League Gothic', 'Orbitron', sans-serif;
            font-size: 22vw;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            color: #fff;
            animation: glow 3s ease-in-out infinite;
            line-height: 1;
            max-width: 99vw;
            width: fit-content;
            white-space: nowrap;
            overflow: hidden;
        }

        #timer .days {
            font-size: 8vw;
            color: rgba(217, 90, 60, 0.7);
            vertical-align: baseline;
            margin-right: 1vw;
        }

        #timer .colon {
            color: rgba(217, 90, 60, 0.6);
            animation: blink 2s step-end infinite;
        }

        #message-box {
            text-align: center;
            max-width: 92vw;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Avatar sits on the same row as the "To #42 Name" line, so it costs
           no extra height in the band under the clock. */
        #message-head {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2vw;
            margin-bottom: 1vh;
        }

        /* Sized in `em` so that scaling its font-size in fitMessage() scales
           the whole circle along with the text beside it. */
        #message-avatar {
            font-size: 1.9vw;
            width: 2.6em;
            height: 2.6em;
            border-radius: 50%;
            overflow: hidden;
            flex: none;
            display: none;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            letter-spacing: 0.02em;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 1s cubic-bezier(0.22, 1, 0.36, 1);
        }
        #message-avatar.on { display: flex; }

        #message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Orange ring as on the event site, thickened so it still reads
               from a distance on the big screen. */
            border: 0.16em solid #fc6014;
            border-radius: 50%;
        }

        #message-target {
            font-family: 'League Gothic', sans-serif;
            font-weight: 400;
            font-size: 3vw;
            color: rgba(217, 90, 60, 0.6);
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 1s cubic-bezier(0.22, 1, 0.36, 1);
            text-transform: uppercase;
            letter-spacing: 0.3vw;
        }

        #message-text {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 5.5vw;
            color: #fff;
            opacity: 0;
            transform: translateY(20px) scale(0.97);
            transition: opacity 1.4s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 1.4s cubic-bezier(0.22, 1, 0.36, 1);
            line-height: 1.3;
        }

        #message-author {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 2.5vw;
            color: rgba(217, 90, 60, 0.8);
            margin-top: 1.5vh;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.4s,
                        transform 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.4s;
        }

        .visible {
            opacity: 1 !important;
            transform: translateY(0) scale(1) !important;
        }

        #status {
            position: absolute;
            top: 2vh;
            right: 2vw;
            font-size: 1vw;
            color: rgba(255, 255, 255, 0.15);
            font-weight: 300;
        }

        #style-select {
            position: absolute;
            top: 2vh;
            left: 2vw;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 0.5vh 0.8vw;
            font-family: 'Inter', sans-serif;
            font-size: 1vw;
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        #style-select:hover { opacity: 1; }
        #style-select option { background: #0a0a1a; color: #eee; }

        /* --- Minimal style --- */
        body.style-minimal #timer {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            animation: none;
            text-shadow: none;
        }
        body.style-minimal #timer .colon { animation: none; }

        /* --- LCD style --- */
        body.style-lcd { background: #0d1410; }
        body.style-lcd #timer {
            font-family: 'Orbitron', monospace;
            color: #7dff9b;
            animation: none;
            text-shadow: 0 0 10px rgba(125, 255, 155, 0.7), 0 0 30px rgba(125, 255, 155, 0.3);
        }
        body.style-lcd #timer .colon { color: #7dff9b; }

        /* --- Retro style --- */
        body.style-retro #timer {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-style: italic;
            color: #f5d76e;
            animation: none;
            text-shadow: 3px 3px 0 rgba(217, 90, 60, 0.6);
        }
        body.style-retro #timer .colon { color: #d95a3c; animation: none; }

        /* --- Red on black style --- */
        body.style-red { background: #000; }
        body.style-red #timer {
            font-family: 'Orbitron', monospace;
            color: #ff0000;
            animation: none;
            text-shadow: none;
        }
        body.style-red #timer .colon { color: #ff0000; animation: none; }

        /* --- LED dot-matrix style --- */
        #clock { display: none; }
        body.style-matrix, body.style-matrix-readable { background: #000; }
        body.style-matrix #timer, body.style-matrix-readable #timer { display: none; }
        body.style-matrix #clock, body.style-matrix-readable #clock {
            display: block;
            width: 94vw;
            max-height: 60vh;
            height: auto;
            overflow: visible;
        }
        #clock .on {
            fill: #ff2200;
            filter: drop-shadow(0 0 3px #ff2200) drop-shadow(0 0 8px #ff0000);
        }
        #clock .off { fill: #1c0503; }

        /* --- LED Matrix (Readable): same dot-matrix clock, higher-contrast
               message popup so the text is easy to read on pure black. --- */
        body.style-matrix-readable #message-target {
            color: #ff6a4d;
            font-size: 3.6vw;
        }
        body.style-matrix-readable #message-text {
            color: #fff;
            font-weight: 500;
            font-size: 6vw;
            text-shadow: 0 0 12px rgba(255, 90, 50, 0.35);
        }
        body.style-matrix-readable #message-author {
            color: #ff5a3c;
            font-size: 3vw;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow:
                    0 0 60px rgba(217, 90, 60, 0.4),
                    0 0 120px rgba(217, 90, 60, 0.15);
            }
            50% {
                text-shadow:
                    0 0 80px rgba(217, 90, 60, 0.6),
                    0 0 160px rgba(217, 90, 60, 0.25);
            }
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }

        @keyframes glow-elapsed {
            0%, 100% {
                text-shadow:
                    0 0 60px rgba(78, 204, 163, 0.4),
                    0 0 120px rgba(78, 204, 163, 0.15);
            }
            50% {
                text-shadow:
                    0 0 80px rgba(78, 204, 163, 0.6),
                    0 0 160px rgba(78, 204, 163, 0.25);
            }
        }

        .elapsed #timer {
            color: #4ecca3;
            animation: glow-elapsed 3s ease-in-out infinite;
        }
        .elapsed #message-author {
            color: rgba(78, 204, 163, 0.8);
        }
        .elapsed #timer .colon {
            color: rgba(78, 204, 163, 0.6);
        }
    </style>
</head>
<body>
    <div id="clock-layer">
        <div id="timer">00:00:00</div>
        <svg id="clock" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="message-layer">
        <div id="message-box">
            <div id="message-head">
                <div id="message-avatar"></div>
                <div id="message-target"></div>
            </div>
            <div id="message-text"></div>
            <div id="message-author"></div>
        </div>
    </div>
    <div id="status"></div>
    <select id="style-select">
        <option value="neon">Neon</option>
        <option value="minimal">Minimal</option>
        <option value="lcd">LCD</option>
        <option value="retro">Retro</option>
        <option value="red">Red on Black</option>
        <option value="matrix">LED Matrix</option>
        <option value="matrix-readable">LED Matrix (Readable)</option>
    </select>
    <div id="sim-controls">
        <label for="sim-date">Simulated date</label>
        <input type="datetime-local" id="sim-date" step="1">
    </div>

    <script>
        const STYLES = ['minimal', 'lcd', 'retro', 'red', 'matrix', 'matrix-readable'];
        function applyStyle(style) {
            STYLES.forEach(s => document.body.classList.remove('style-' + s));
            if (style !== 'neon') document.body.classList.add('style-' + style);
        }
        const styleSelect = document.getElementById('style-select');
        const validStyles = ['neon', ...STYLES];
        // Precedence: ?style=... in URL, then saved choice, then default.
        const urlStyle = new URLSearchParams(location.search).get('style');
        const initialStyle = (urlStyle && validStyles.includes(urlStyle))
            ? urlStyle
            : (localStorage.getItem('clockStyle') || 'neon');
        styleSelect.value = initialStyle;
        applyStyle(initialStyle);
        styleSelect.addEventListener('change', () => {
            const v = styleSelect.value;
            localStorage.setItem('clockStyle', v);
            const params = new URLSearchParams(location.search);
            params.set('style', v);
            history.replaceState(null, '', location.pathname + '?' + params.toString());
            applyStyle(v);
            if (typeof updateTimer === 'function') updateTimer();
            // Styles change both the clock size and the message font sizes.
            if (typeof fitMessage === 'function') fitMessage();
        });
    </script>

    <script>
        const RAW_TARGET = '{{TARGET_DATE}}';
        let TARGET = new Date(RAW_TARGET).getTime();
        if (isNaN(TARGET)) {
            // Placeholder not substituted (e.g. file opened directly) or bad env.
            TARGET = new Date('2026-07-25T12:00:00Z').getTime();
        }

        // On /simulate this is true: show a date field that overrides TARGET.
        const SIMULATE = ('{{SIMULATE}}' === 'true');

        function formatTime(totalSeconds, showDays) {
            if (showDays) {
                const d = Math.floor(totalSeconds / 86400);
                const h = String(Math.floor((totalSeconds % 86400) / 3600)).padStart(2, '0');
                const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
                const s = String(totalSeconds % 60).padStart(2, '0');
                if (d > 0) {
                    return `<span class="days">${d}d</span>${h}<span class="colon">:</span>${m}<span class="colon">:</span>${s}`;
                }
                return `${h}<span class="colon">:</span>${m}<span class="colon">:</span>${s}`;
            }
            const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const s = String(totalSeconds % 60).padStart(2, '0');
            return `${h}<span class="colon">:</span>${m}<span class="colon">:</span>${s}`;
        }

        /* --- LED dot-matrix renderer (5x7 dots per digit) --- */
        const MATRIX_FONT = {
            '0': ["01110","10001","10011","10101","11001","10001","01110"],
            '1': ["00100","01100","00100","00100","00100","00100","01110"],
            '2': ["01110","10001","00001","00010","00100","01000","11111"],
            '3': ["11111","00010","00100","00010","00001","10001","01110"],
            '4': ["00010","00110","01010","10010","11111","00010","00010"],
            '5': ["11111","10000","11110","00001","00001","10001","01110"],
            '6': ["00110","01000","10000","11110","10001","10001","01110"],
            '7': ["11111","00001","00010","00100","01000","01000","01000"],
            '8': ["01110","10001","10001","01110","10001","10001","01110"],
            '9': ["01110","10001","10001","01111","00001","00010","01100"],
        };
        const MATRIX_COLON = ["00000","01100","01100","00000","01100","01100","00000"];
        const M_R = 5, M_GAP = 14, M_CW = 5, M_CH = 7,
              M_CGAP = M_GAP * 1.6, M_GGAP = M_GAP * 0.6, M_PAD = 14;
        const clockSvg = document.getElementById('clock');
        let matrixSlots = [];

        function buildMatrix(chars) {
            clockSvg.innerHTML = '';
            const slots = [];
            let cursorX = 0;
            chars.forEach(ch => {
                slots.push({ ch, x: cursorX });
                cursorX += (M_CW - 1) * M_GAP + M_CGAP + (ch === ':' ? M_GGAP : 0);
            });
            const totalW = cursorX - M_CGAP + M_R * 2;
            const totalH = (M_CH - 1) * M_GAP + M_R * 2;
            clockSvg.setAttribute('viewBox',
                `${-M_R - M_PAD} ${-M_R - M_PAD} ${totalW + M_PAD * 2} ${totalH + M_PAD * 2}`);
            clockSvg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
            slots.forEach(slot => {
                slot.leds = [];
                for (let r = 0; r < M_CH; r++) {
                    slot.leds[r] = [];
                    for (let c = 0; c < M_CW; c++) {
                        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        dot.setAttribute('cx', slot.x + c * M_GAP);
                        dot.setAttribute('cy', r * M_GAP);
                        dot.setAttribute('r', M_R);
                        dot.setAttribute('class', 'off');
                        clockSvg.appendChild(dot);
                        slot.leds[r][c] = dot;
                    }
                }
            });
            return slots;
        }

        let matrixLen = -1;
        function renderMatrix(str) {
            if (str.length !== matrixLen) {
                matrixSlots = buildMatrix(str.split(''));
                matrixLen = str.length;
            }
            str.split('').forEach((ch, i) => {
                const pat = ch === ':' ? MATRIX_COLON : MATRIX_FONT[ch];
                const slot = matrixSlots[i];
                for (let r = 0; r < M_CH; r++)
                    for (let c = 0; c < M_CW; c++)
                        slot.leds[r][c].setAttribute('class', pat[r][c] === '1' ? 'on' : 'off');
            });
        }

        function matrixString(totalSeconds) {
            const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const s = String(totalSeconds % 60).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function fitTimer() {
            const el = document.getElementById('timer');
            let size = 22;
            el.style.fontSize = size + 'vw';
            while (el.scrollWidth > window.innerWidth * 0.99 && size > 5) {
                size -= 0.5;
                el.style.fontSize = size + 'vw';
            }
        }

        function updateTimer() {
            const now = Date.now();
            const diff = TARGET - now;

            let totalSeconds, showDays;
            if (diff > 0) {
                document.body.classList.remove('elapsed');
                totalSeconds = Math.floor(diff / 1000);
                showDays = true;
            } else {
                document.body.classList.add('elapsed');
                totalSeconds = Math.floor((-diff) / 1000);
                showDays = false;
            }

            if (document.body.classList.contains('style-matrix')
                || document.body.classList.contains('style-matrix-readable')) {
                renderMatrix(matrixString(totalSeconds));
            } else {
                document.getElementById('timer').innerHTML = formatTime(totalSeconds, showDays);
                fitTimer();
            }

            // The clock changes height when the digit count does (days
            // appearing/disappearing), so re-park the message band under it.
            const bottom = Math.round(clockBottom());
            if (bottom !== lastClockBottom) {
                lastClockBottom = bottom;
                if (typeof fitMessage === 'function') fitMessage();
            }
        }

        let lastClockBottom = -1;
        function clockBottom() {
            const svg = document.getElementById('clock');
            const el = svg.getBoundingClientRect().height > 0
                ? svg : document.getElementById('timer');
            return el.getBoundingClientRect().bottom;
        }

        let messages = [];
        let shownIds = new Set();

        async function fetchMessages() {
            try {
                const res = await fetch('/api/messages');
                messages = await res.json();
                document.getElementById('status').textContent = `${messages.length} message(s)`;
            } catch (e) {
                // will retry on next interval
            }
        }

        function showRandomMessage() {
            if (messages.length === 0) return;

            let pool = messages.filter((_, i) => !shownIds.has(i));
            if (pool.length === 0) {
                shownIds.clear();
                pool = messages;
            }
            const idx = messages.indexOf(pool[Math.floor(Math.random() * pool.length)]);
            shownIds.add(idx);
            const msg = messages[idx];

            const avatarEl = document.getElementById('message-avatar');
            const targetEl = document.getElementById('message-target');
            const textEl = document.getElementById('message-text');
            const authorEl = document.getElementById('message-author');

            avatarEl.classList.remove('visible');
            targetEl.classList.remove('visible');
            textEl.classList.remove('visible');
            authorEl.classList.remove('visible');

            // Fade the current message out, then bring the next one in.
            // Messages never expire on their own: one stays until the next
            // rotates in, so the display is never blank.
            setTimeout(() => {
                renderAvatar(msg);
                targetEl.textContent = `To #${msg.bib} ${msg.runner_name}`;
                textEl.textContent = `”${msg.text}”`;
                authorEl.textContent = `From ${msg.author}`;
                fitMessage();
                avatarEl.classList.add('visible');
                targetEl.classList.add('visible');
                textEl.classList.add('visible');
                authorEl.classList.add('visible');
            }, 1200);
        }

        // --- Avatar, following Mantine's <Avatar color="initials"> convention
        //     so a runner looks the same here as on the event site. The colour
        //     is derived from the name, not random, so it is stable per person.
        //     Ported from @mantine/core 8.3.10 get-initials / get-initials-color.
        const AVATAR_COLORS = {
            blue:   { fg: '#74c0fc', bg: '#228be6' },
            cyan:   { fg: '#66d9e8', bg: '#15aabf' },
            grape:  { fg: '#e599f7', bg: '#be4bdb' },
            green:  { fg: '#8ce99a', bg: '#40c057' },
            indigo: { fg: '#91a7ff', bg: '#4c6ef5' },
            lime:   { fg: '#c0eb75', bg: '#82c91e' },
            orange: { fg: '#ffc078', bg: '#fd7e14' },
            pink:   { fg: '#faa2c1', bg: '#e64980' },
            red:    { fg: '#ffa8a8', bg: '#fa5252' },
            teal:   { fg: '#63e6be', bg: '#12b886' },
            violet: { fg: '#b197fc', bg: '#7950f2' },
        };
        const AVATAR_COLOR_NAMES = Object.keys(AVATAR_COLORS);

        function getInitials(name, limit = 2) {
            const splitted = name.split(' ');
            if (splitted.length === 1) return name.slice(0, limit).toUpperCase();
            return splitted.map(w => w[0]).slice(0, limit).join('').toUpperCase();
        }

        function hashCode(input) {
            let hash = 0;
            for (let i = 0; i < input.length; i += 1) {
                const char = input.charCodeAt(i);
                hash = (hash << 5) - hash + char;
                hash |= 0;
            }
            return hash;
        }

        function getInitialsColor(name) {
            const index = Math.abs(hashCode(name)) % AVATAR_COLOR_NAMES.length;
            return AVATAR_COLORS[AVATAR_COLOR_NAMES[index]];
        }

        function renderAvatar(msg) {
            const el = document.getElementById('message-avatar');
            el.classList.add('on');
            el.style.background = '';
            el.style.color = '';

            if (msg.profile_url) {
                const img = new Image();
                img.src = msg.profile_url;
                img.alt = '';
                // A dead Strava URL must not leave an empty circle on screen.
                img.onerror = () => showInitials(el, msg.runner_name);
                el.replaceChildren(img);
                return;
            }
            showInitials(el, msg.runner_name);
        }

        function showInitials(el, name) {
            const { fg, bg } = getInitialsColor(name);
            // Mantine's "light" variant: tinted wash behind a bright glyph,
            // which stays legible on the display's black background.
            el.style.background = bg + '33';
            el.style.color = fg;
            el.textContent = getInitials(name);
        }

        // Keep the message inside the band under the clock: park the band just
        // below whichever clock is visible, then shrink the message text until
        // it fits. Without this, a long message wraps and grows up over the
        // digits.
        function fitMessage() {
            const layer = document.getElementById('message-layer');
            const box = document.getElementById('message-box');
            const parts = ['message-avatar', 'message-target', 'message-text', 'message-author']
                .map(id => document.getElementById(id));

            // The dot-matrix styles swap #timer for the #clock SVG.
            const svg = document.getElementById('clock');
            const clockEl = svg.getBoundingClientRect().height > 0
                ? svg : document.getElementById('timer');

            // Start from each style's natural sizes so the text can grow back
            // when a short message follows a long one.
            parts.forEach(el => { el.style.fontSize = ''; });
            const bases = parts.map(el => parseFloat(getComputedStyle(el).fontSize));

            const gap = window.innerHeight * 0.03;
            const top = clockEl.getBoundingClientRect().bottom + gap;
            // Never let the band collapse to nothing on short viewports.
            const maxTop = window.innerHeight * 0.8;
            layer.style.top = Math.min(top, maxTop) + 'px';

            // Scale all three lines by one factor, so the target and author
            // lines shrink with the message instead of being clipped off.
            const avail = layer.clientHeight;
            let scale = 1;
            while (box.scrollHeight > avail && scale > 0.3) {
                scale -= 0.05;
                parts.forEach((el, i) => { el.style.fontSize = bases[i] * scale + 'px'; });
            }
        }

        window.addEventListener('resize', fitMessage);

        // Simulate mode: reveal the date field and let it override TARGET.
        if (SIMULATE) {
            const simCtl = document.getElementById('sim-controls');
            const simDate = document.getElementById('sim-date');
            simCtl.classList.add('on');
            const pad = n => String(n).padStart(2, '0');
            const d = new Date(TARGET);
            simDate.value = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`
                + `T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
            simDate.addEventListener('input', () => {
                const t = new Date(simDate.value).getTime();
                if (!isNaN(t)) {
                    TARGET = t;
                    updateTimer();
                }
            });
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        setInterval(fetchMessages, 5000);
        fetchMessages();

        setInterval(showRandomMessage, 30000);
        setTimeout(showRandomMessage, 2000);
    </script>
</body>
</html>
