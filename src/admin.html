<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Messages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=League+Gothic&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: #eee;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .wrap { max-width: 760px; margin: 0 auto; }
        h1 {
            font-family: 'League Gothic', 'Inter', sans-serif;
            font-weight: 400;
            font-size: 44px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            margin-bottom: 24px;
            color: #fff;
        }
        /* --- login --- */
        #login { max-width: 380px; margin: 12vh auto 0; }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            color: #eee;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: rgba(217, 90, 60, 0.4); }
        button {
            background: #d95a3c;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #c44e33; }
        #login button { width: 100%; margin-top: 18px; padding: 15px; }
        #error {
            color: #ff6b52;
            font-size: 13px;
            margin-top: 14px;
            min-height: 18px;
            text-align: center;
        }
        /* --- list --- */
        #app { display: none; }
        .bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .count { font-size: 14px; color: rgba(255, 255, 255, 0.4); margin-bottom: 16px; }
        .logout {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }
        .logout:hover { background: rgba(255, 255, 255, 0.06); }
        .msg {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 12px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .msg .body { flex: 1; min-width: 0; }
        .msg .meta {
            font-size: 12px;
            color: rgba(217, 90, 60, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .msg .text {
            font-size: 16px;
            color: #fff;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .msg .author { font-size: 13px; color: rgba(255, 255, 255, 0.45); margin-top: 6px; }
        .msg .del {
            background: transparent;
            border: 1px solid rgba(255, 107, 82, 0.4);
            color: #ff6b52;
            padding: 8px 14px;
            font-size: 13px;
            flex-shrink: 0;
        }
        .msg .del:hover { background: rgba(255, 107, 82, 0.12); }
        .empty { color: rgba(255, 255, 255, 0.35); text-align: center; padding: 40px 0; }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="login">
            <h1>Admin</h1>
            <label for="token">Access token</label>
            <input type="password" id="token" autocomplete="off" placeholder="ADMIN_TOKEN">
            <button id="loginBtn">Log in</button>
            <div id="error"></div>
        </div>

        <div id="app">
            <div class="bar">
                <h1>Messages</h1>
                <button class="logout" id="logoutBtn">Log out</button>
            </div>
            <div class="count" id="count"></div>
            <div id="list"></div>
        </div>
    </div>

    <script>
        const KEY = 'adminToken';
        const loginEl = document.getElementById('login');
        const appEl = document.getElementById('app');
        const tokenInput = document.getElementById('token');
        const errorEl = document.getElementById('error');
        const listEl = document.getElementById('list');
        const countEl = document.getElementById('count');

        function token() { return sessionStorage.getItem(KEY) || ''; }

        function esc(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        async function loadMessages() {
            const res = await fetch('/api/messages');
            const messages = await res.json();
            countEl.textContent = `${messages.length} message(s)`;
            if (messages.length === 0) {
                listEl.innerHTML = '<div class="empty">No messages.</div>';
                return;
            }
            listEl.innerHTML = messages.map(m => `
                <div class="msg" data-id="${m.id}">
                    <div class="body">
                        <div class="meta">#${esc(m.bib)} ${esc(m.runner_name)}</div>
                        <div class="text">${esc(m.text)}</div>
                        <div class="author">— ${esc(m.author)}</div>
                    </div>
                    <button class="del" data-id="${m.id}">Delete</button>
                </div>
            `).join('');
        }

        async function del(id) {
            const res = await fetch(`/api/messages/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token() },
            });
            if (res.status === 401) { logout(); return; }
            if (res.ok) {
                const el = listEl.querySelector(`.msg[data-id="${id}"]`);
                if (el) el.remove();
            }
        }

        listEl.addEventListener('click', (e) => {
            const btn = e.target.closest('.del');
            if (!btn) return;
            if (confirm('Delete this message?')) del(btn.dataset.id);
        });

        async function enterApp() {
            loginEl.style.display = 'none';
            appEl.style.display = 'block';
            await loadMessages();
        }

        function logout() {
            sessionStorage.removeItem(KEY);
            appEl.style.display = 'none';
            loginEl.style.display = 'block';
            errorEl.textContent = 'Session expired or invalid token.';
        }

        document.getElementById('logoutBtn').onclick = logout;

        // Validate the token against the auth-protected DELETE endpoint using a
        // non-existent id (0 never exists): a wrong token gives 401, a correct
        // one gives 404 — and deletes nothing either way.
        async function tokenValid(t) {
            const res = await fetch('/api/messages/0', {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + t },
            });
            return res.status !== 401;
        }

        document.getElementById('loginBtn').onclick = async () => {
            const t = tokenInput.value.trim();
            if (!t) return;
            errorEl.textContent = '';
            if (await tokenValid(t)) {
                sessionStorage.setItem(KEY, t);
                enterApp();
            } else {
                errorEl.textContent = 'Invalid token.';
            }
        };

        tokenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });

        // Resume an existing session.
        if (token()) enterApp();
    </script>
</body>
</html>
